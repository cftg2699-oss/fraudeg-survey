<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #21262d;
  --border: #30363d;
  --accent: #84CC16;
  --accent-glow: rgba(132, 204, 22, 0.25);
  --accent2: #65a30d;
  --text: #f0f6fc;
  --text-dim: #8b949e;
  --text-muted: #6e7681;
  --danger: #f85149;
  --success: #2ea043;
  --warning: #d29922;
  --radius: 12px;
  --radius-sm: 8px;
  --font: 'DM Sans', system-ui, sans-serif;
  --mono: 'Space Mono', monospace;
}
html{font-size:18px; scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(132,204,22,.05),transparent),linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:100% 100%,60px 60px,60px 60px;pointer-events:none}
.app{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:24px 20px 60px}
.header{text-align:center;margin-bottom:40px;padding-top:20px}
.logo{font-family:var(--font);font-size:3rem;font-weight:700;letter-spacing:-1px;display:flex;justify-content:center;align-items:center;margin-bottom:8px}
.logo .fraud{color:#ffffff}
.logo .eg{color:var(--accent)}
.tagline{font-size:.9rem;color:var(--text-dim);letter-spacing:.5px}
.progress-wrap{margin-bottom:36px}
.progress-bar-bg{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 12px var(--accent-glow)}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:.8rem;color:var(--text-muted);font-family:var(--mono)}
.progress-info .step-label{color:var(--accent);font-weight:700}
.step{display:none;animation:fadeUp .4s ease both}
.step.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.step-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 32px;position:relative;overflow:hidden}
.step-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2),transparent)}
.q-number{font-family:var(--mono);font-size:.75rem;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.q-number .badge{font-size:.65rem;padding:3px 10px;border-radius:99px;background:rgba(132,204,22,.15);border:1px solid rgba(132,204,22,.3);color:var(--accent)}
.q-number .badge.optional{background:rgba(210,153,34,.1);border-color:rgba(210,153,34,.3);color:var(--warning)}
.q-title{font-size:1.3rem;font-weight:600;line-height:1.4;margin-bottom:24px;color:var(--text)}
.q-hint{font-size:.85rem;color:var(--text-muted);margin-bottom:16px;font-style:italic}
.options-single{display:flex;flex-direction:column;gap:12px}
.opt-btn{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;text-align:left;font-size:1rem;line-height:1.5;color:var(--text)}
.opt-btn:hover{border-color:var(--accent);background:rgba(132,204,22,.06)}
.opt-btn.selected{border-color:var(--accent);background:rgba(132,204,22,.1);box-shadow:0 0 0 1px var(--accent),0 4px 16px var(--accent-glow)}
.opt-radio{width:20px;height:20px;min-width:20px;border-radius:50%;border:2px solid var(--border);margin-top:2px;transition:all .2s}
.opt-btn.selected .opt-radio{border-color:var(--accent);background:var(--accent);box-shadow:inset 0 0 0 3px var(--surface2)}
.options-multi{display:flex;flex-direction:column;gap:10px}
.opt-check{display:flex;align-items:flex-start;gap:14px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;font-size:.95rem;line-height:1.4;color:var(--text)}
.opt-check:hover{border-color:var(--accent);background:rgba(132,204,22,.04)}
.opt-check.selected{border-color:var(--accent);background:rgba(132,204,22,.08)}
.opt-checkbox{width:20px;height:20px;min-width:20px;border-radius:4px;border:2px solid var(--border);margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px}
.opt-check.selected .opt-checkbox{border-color:var(--accent);background:var(--accent);color:#000}
.opt-check.selected .opt-checkbox::after{content:'✓';font-weight:bold}
.max-hint{font-size:.8rem;color:var(--warning);margin-top:10px;font-family:var(--mono)}
.max-reached .opt-check:not(.selected){opacity:.4;pointer-events:none}
.field-group{margin-bottom:18px}
.field-label{display:block;font-size:.85rem;color:var(--text-dim);margin-bottom:8px;font-weight:500}
.field-label .req{color:var(--danger)}
input[type="text"],input[type="email"],input[type="tel"],textarea{width:100%;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:1rem;transition:border-color .2s;outline:none}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
textarea{resize:vertical;min-height:90px}
input::placeholder,textarea::placeholder{color:var(--text-muted)}
.open-field{margin-top:12px;display:none;animation:fadeUp .3s ease both}
.open-field.visible{display:block}
.conditional-textarea{margin-top:14px;display:none;animation:fadeUp .3s ease both}
.conditional-textarea.visible{display:block}
.contact-form{margin-top:20px;display:none;animation:fadeUp .3s ease both}
.contact-form.visible{display:block}
.contact-form .header-label{font-size:.95rem;color:var(--text);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);font-weight:500}
.btn-row{display:flex;gap:12px;margin-top:30px;justify-content:flex-end;flex-wrap:wrap}
.btn{padding:14px 32px;border-radius:var(--radius-sm);font-family:var(--font);font-size:1rem;font-weight:600;cursor:pointer;transition:all .25s;border:none;letter-spacing:.3px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;box-shadow:0 4px 16px var(--accent-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(132,204,22,.4)}
.btn-primary:disabled{opacity:.4;pointer-events:none;transform:none}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text-dim);color:var(--text)}
.btn-skip{background:transparent;color:var(--text-muted);border:1px dashed var(--border);font-size:.9rem}
.btn-skip:hover{border-color:var(--text-dim);color:var(--text-dim)}
.contact-grid{display:grid;gap:16px}
.thank-you{text-align:center;padding:60px 20px}
.thank-you .icon{font-size:3.5rem;margin-bottom:20px;color:var(--accent)}
.thank-you h2{font-size:1.8rem;font-weight:700;margin-bottom:12px;color:var(--text)}
.thank-you p{color:var(--text-dim);line-height:1.6;max-width:480px;margin:0 auto;font-size:1rem}
.error-msg{font-size:.8rem;color:var(--danger);margin-top:8px;display:none;font-family:var(--mono)}
.error-msg.visible{display:block}
.field-error input,.field-error textarea{border-color:var(--danger)!important}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--danger);color:#fff;padding:14px 28px;border-radius:var(--radius-sm);font-size:.95rem;font-weight:500;opacity:0;transition:all .3s;z-index:999;pointer-events:none;box-shadow:0 8px 24px rgba(248,81,73,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.sending-overlay{position:fixed;inset:0;background:rgba(13,17,23,.85);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.sending-overlay.visible{display:flex}
.sending-box{text-align:center}
.spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.sending-box p{color:var(--text-dim);font-size:1rem}
@media(max-width:600px){.app{padding:16px 14px 40px}.step-card{padding:28px 20px}.q-title{font-size:1.15rem}.btn-row{flex-direction:column}.btn{width:100%;text-align:center}}
</style>
</head>

const Q_SHARED_MID = [

  {

    placeholder:'Escriba cómo sería para usted una solución ideal e integral…'

const Q_UNIVERSAL_END = [

  {

    type:'single', required:true, max:1,
    options:['Sí — estamos evaluando opciones activamente','Tal vez — dependería de qué ofrece la alternativa','No — estamos comprometidos con el proveedor actual'],

  {
    // ★ Ahora obligatoria

let currentStep = 0;
let answers = {};
let currentFlow = [];
let selectedSector = null;

function buildFlow(sector) {
  selectedSector = sector;
  let sectorQs;
  switch(sector) {
    case 'fintech': sectorQs = Q_FINTECH; break;
    case 'retail': sectorQs = Q_RETAIL; break;
    case 'marketplace': sectorQs = Q_MARKETPLACE; break;
    default: sectorQs = []; break;
  }
  currentFlow = [...Q_UNIVERSAL_START, ...sectorQs, ...Q_SHARED_MID, ...Q_UNIVERSAL_END];
}
buildFlow('retail');

function renderStep(idx) {
  const q = currentFlow[idx];
  const container = document.getElementById('formContainer');
  let html = `<div class="step active" id="step-${idx}"><div class="step-card">`;
  const badgeType = q.required ? '' : 'optional';
  const badgeText = q.required ? 'Obligatoria' : 'Opcional';
  html += `<div class="q-number">${q.id} <span class="badge ${badgeType}">${badgeText}</span></div>`;
  html += `<div class="q-title">${q.title}</div>`;

  if (q.type === 'single') {
    html += `<div class="options-single" id="opts-${idx}">`;
    q.options.forEach((opt, i) => {
      html += `<div class="opt-btn" data-idx="${i}" onclick="selectSingle(${idx},${i})"><div class="opt-radio"></div><div>${opt}</div></div>`;
    });
    html += '</div>';
    if (q.hasOtherField) html += `<div class="open-field" id="other-${idx}"><input type="text" placeholder="Especifica tu respuesta…" id="otherInput-${idx}"></div>`;
    if (q.conditionalTextarea !== undefined) html += `<div class="conditional-textarea" id="condText-${idx}"><textarea placeholder="${q.conditionalPlaceholder||'Especifica…'}" id="condTextInput-${idx}"></textarea></div>`;
    if (q.conditionalBudgetField !== undefined) html += `<div class="conditional-textarea" id="budgetField-${idx}"><div class="field-group"><label class="field-label">Valor aproximado (USD)</label><input type="text" placeholder="Ej: 50,000" id="budgetInput-${idx}"></div></div>`;
  }
  else if (q.type === 'multi') {
    if (q.max < 99) html += `<div class="q-hint">Selecciona hasta ${q.max} opciones</div>`;
    html += `<div class="options-multi" id="opts-${idx}">`;
    q.options.forEach((opt, i) => {
      html += `<div class="opt-check" data-idx="${i}" onclick="toggleMulti(${idx},${i})"><div class="opt-checkbox"></div><div>${opt}</div></div>`;
    });
    html += '</div>';
    if (q.max < 99) html += `<div class="max-hint" id="maxHint-${idx}">0 / ${q.max} seleccionadas</div>`;
    if (q.hasOtherField) html += `<div class="open-field" id="other-${idx}"><input type="text" placeholder="Especifica tu respuesta…" id="otherInput-${idx}"></div>`;
  }
  else if (q.type === 'textarea') {
    html += `<textarea placeholder="${q.placeholder||''}" id="textareaInput-${idx}" rows="4"></textarea>`;
  }
  else if (q.type === 'contact-intent') {
    html += `<div class="options-single" id="opts-${idx}">`;
    q.options.forEach((opt, i) => {
      html += `<div class="opt-btn" data-idx="${i}" onclick="selectContactIntent(${idx},${i})"><div class="opt-radio"></div><div>${opt}</div></div>`;
    });
    html += '</div>';
    html += `<div class="contact-form" id="contactForm-${idx}">
      <div class="header-label" id="contactFormLabel-${idx}">Por favor completa tus datos</div>
      <div class="contact-grid">
        <div class="field-group"><label class="field-label">Nombre completo <span class="req">*</span></label><input type="text" id="c-name" placeholder="Tu nombre"><div class="error-msg" id="err-name">Campo obligatorio</div></div>
        <div class="field-group"><label class="field-label">Empresa / Organización</label><input type="text" id="c-company" placeholder="Nombre de la empresa"></div>
        <div class="field-group"><label class="field-label">Correo electrónico <span class="req">*</span></label><input type="email" id="c-email" placeholder="correo@empresa.com"><div class="error-msg" id="err-email">Ingresa un correo válido</div></div>
        <div class="field-group" id="phoneGroup-${idx}"><label class="field-label">Teléfono <span class="req">*</span></label><input type="tel" id="c-phone" placeholder="+57 300 123 4567"><div class="error-msg" id="err-phone">Ingresa un teléfono válido</div></div>
        <div class="field-group"><label class="field-label">País</label><input type="text" id="c-country" placeholder="País"></div>
      </div>
    </div>`;
  }

  html += '<div class="btn-row">';
  if (idx > 0) html += `<button class="btn btn-ghost" onclick="goBack()">← Atrás</button>`;
  if (!q.required) html += `<button class="btn btn-skip" onclick="skipStep()">Saltar</button>`;
  if (q.type === 'contact-intent') {
    html += `<button class="btn btn-primary" id="submitBtn-${idx}" onclick="submitForm()" style="display:none;">Enviar ✓</button>`;
  } else {
    html += `<button class="btn btn-primary" id="nextBtn-${idx}" onclick="goNext()" ${q.autoAdvance ? 'style="display:none;"' : ''}>Continuar →</button>`;
  }
  html += '</div></div></div>';
  container.innerHTML = html;
  updateProgress();
}

function selectSingle(stepIdx, optIdx) {
  const q = currentFlow[stepIdx];
  answers[q.id] = { value: q.options[optIdx], index: optIdx };
  document.querySelectorAll(`#opts-${stepIdx} .opt-btn`).forEach(el => el.classList.remove('selected'));
  document.querySelector(`#opts-${stepIdx} .opt-btn[data-idx="${optIdx}"]`).classList.add('selected');
  let shouldPause = false;
  if (q.hasOtherField) {
    const isOther = optIdx === q.options.length - 1;
    document.getElementById(`other-${stepIdx}`).classList.toggle('visible', isOther);
    if (isOther) { document.getElementById(`otherInput-${stepIdx}`).focus(); shouldPause = true; }
  }
  if (q.conditionalTextarea !== undefined) {
    const isCond = optIdx === q.conditionalTextarea;
    document.getElementById(`condText-${stepIdx}`).classList.toggle('visible', isCond);
    if (isCond) { document.getElementById(`condTextInput-${stepIdx}`).focus(); shouldPause = true; }
  }
  if (q.conditionalBudgetField !== undefined) {
    const isBudget = optIdx === q.conditionalBudgetField;
    document.getElementById(`budgetField-${stepIdx}`).classList.toggle('visible', isBudget);
    if (isBudget) { document.getElementById(`budgetInput-${stepIdx}`).focus(); shouldPause = true; }
  }
  const nextBtn = document.getElementById(`nextBtn-${stepIdx}`);
  if (q.autoAdvance && nextBtn) nextBtn.style.display = shouldPause ? 'inline-block' : 'none';
  if (q.autoAdvance && !shouldPause) setTimeout(() => goNext(), 400);
}

// ★ NUEVO: Handler para Q12 con 3 flujos según intención
function selectContactIntent(stepIdx, optIdx) {
  const q = currentFlow[stepIdx];
  answers[q.id] = { value: q.options[optIdx], index: optIdx };
  document.querySelectorAll(`#opts-${stepIdx} .opt-btn`).forEach(el => el.classList.remove('selected'));
  document.querySelector(`#opts-${stepIdx} .opt-btn[data-idx="${optIdx}"]`).classList.add('selected');

  const form = document.getElementById(`contactForm-${stepIdx}`);
  const submitBtn = document.getElementById(`submitBtn-${stepIdx}`);
  const label = document.getElementById(`contactFormLabel-${stepIdx}`);
  const phoneGroup = document.getElementById(`phoneGroup-${stepIdx}`);

  if (optIdx === 0) {
    // Sí — formulario completo con teléfono
    form.classList.add('visible');
    label.textContent = 'Para que te contactemos, necesitamos algunos datos';
    phoneGroup.style.display = 'block';
    submitBtn.style.display = 'inline-block';
    submitBtn.textContent = 'Enviar ✓';
    setTimeout(() => document.getElementById('c-name').focus(), 300);
  } else if (optIdx === 1) {
    // Solo resumen — sin teléfono
    form.classList.add('visible');
    label.textContent = 'Para enviarte el resumen, necesitamos tu nombre y correo';
    phoneGroup.style.display = 'none';
    submitBtn.style.display = 'inline-block';
    submitBtn.textContent = 'Enviar ✓';
    setTimeout(() => document.getElementById('c-name').focus(), 300);
  } else {
    // No — envío anónimo directo
    form.classList.remove('visible');
    submitBtn.style.display = 'inline-block';
    submitBtn.textContent = 'Finalizar ✓';
  }
}

function toggleMulti(stepIdx, optIdx) {
  const q = currentFlow[stepIdx];
  if (!answers[q.id]) answers[q.id] = { values: [], indices: [] };
  const ans = answers[q.id];
  const el = document.querySelector(`#opts-${stepIdx} .opt-check[data-idx="${optIdx}"]`);
  if (el.classList.contains('selected')) {
    el.classList.remove('selected');
    ans.indices = ans.indices.filter(i => i !== optIdx);
    ans.values = ans.indices.map(i => q.options[i]);
  } else {
    if (q.max < 99 && ans.indices.length >= q.max) { showToast(`Máximo ${q.max} opciones`); return; }
    el.classList.add('selected');
    ans.indices.push(optIdx);
    ans.values = ans.indices.map(i => q.options[i]);
  }
  if (q.max < 99) {
    document.getElementById(`maxHint-${stepIdx}`).textContent = `${ans.indices.length} / ${q.max} seleccionadas`;
    document.getElementById(`opts-${stepIdx}`).classList.toggle('max-reached', ans.indices.length >= q.max);
  }
  if (q.hasOtherField) {
    const otherIdx = q.options.length - 1;
    document.getElementById(`other-${stepIdx}`).classList.toggle('visible', ans.indices.includes(otherIdx));
  }
}

function goNext() {
  const q = currentFlow[currentStep];
  if (q.required) {
    if (q.type === 'single' && !answers[q.id]) { showToast('Selecciona una opción para continuar'); return; }
    if (q.type === 'multi' && (!answers[q.id] || answers[q.id].indices.length === 0)) { showToast('Selecciona al menos una opción'); return; }
  }
  if (q.hasOtherField && answers[q.id]) {
    const oi = document.getElementById(`otherInput-${currentStep}`);
    if (oi && oi.parentElement.classList.contains('visible')) answers[q.id].otherText = oi.value;
  }
  if (q.conditionalTextarea !== undefined && answers[q.id]) {
    const ci = document.getElementById(`condTextInput-${currentStep}`);
    if (ci && ci.parentElement.classList.contains('visible')) {
      if (q.required && !ci.value.trim()) { showToast('Por favor completa el campo adicional'); return; }
      answers[q.id].conditionalText = ci.value;
    }
  }
  if (q.conditionalBudgetField !== undefined && answers[q.id]) {
    const bi = document.getElementById(`budgetInput-${currentStep}`);
    if (bi && bi.parentElement.classList.contains('visible')) answers[q.id].budgetValue = bi.value;
  }
  if (q.type === 'textarea') {
    const ta = document.getElementById(`textareaInput-${currentStep}`);
    answers[q.id] = { value: ta.value };
  }
  if (q.id === 'Q02' && answers.Q02) {
    const sectorKey = q.sectorMap[answers.Q02.index] || 'otro';
    buildFlow(sectorKey);
    currentStep = 2;
    renderStep(currentStep);
    return;
  }
  currentStep++;
  if (currentStep < currentFlow.length) renderStep(currentStep);
}

function goBack() {
  if (currentStep > 0) {
    if (currentStep === 2) currentStep = 1;
    else currentStep--;
    renderStep(currentStep);
  }
}

function skipStep() {
  currentStep++;
  if (currentStep < currentFlow.length) renderStep(currentStep);
}

function submitForm() {
  const q12 = answers.Q12;
  if (!q12) { showToast('Selecciona una opción'); return; }
  const intent = q12.index;

  let contactData = { name:'', email:'', phone:'', company:'', country:'' };

  if (intent === 0 || intent === 1) {
    const name = document.getElementById('c-name').value.trim();
    const email = document.getElementById('c-email').value.trim();
    const phone = document.getElementById('c-phone').value.trim();
    const company = document.getElementById('c-company').value.trim();
    const country = document.getElementById('c-country').value.trim();
    let valid = true;

    if (!name) { document.getElementById('err-name').classList.add('visible'); document.getElementById('err-name').parentElement.classList.add('field-error'); valid = false; }
    else { document.getElementById('err-name').classList.remove('visible'); document.getElementById('err-name').parentElement.classList.remove('field-error'); }

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('err-email').classList.add('visible'); document.getElementById('err-email').parentElement.classList.add('field-error'); valid = false; }
    else { document.getElementById('err-email').classList.remove('visible'); document.getElementById('err-email').parentElement.classList.remove('field-error'); }

    if (intent === 0) {
      if (!phone || phone.length < 7) { document.getElementById('err-phone').classList.add('visible'); document.getElementById('err-phone').parentElement.classList.add('field-error'); valid = false; }
      else { document.getElementById('err-phone').classList.remove('visible'); document.getElementById('err-phone').parentElement.classList.remove('field-error'); }
    }

    if (!valid) { showToast('Completa los campos obligatorios'); return; }
    contactData = { name, email, phone, company, country };
  }

  answers.Q12.contact = contactData;
  answers.Q12.intent = intent === 0 ? 'CONTACTAR' : intent === 1 ? 'SOLO_RESUMEN' : 'NO_CONTACTO';

  const payload = {
    timestamp: new Date().toISOString(),
    sector: selectedSector,
    responses: {},
    contact_intent: answers.Q12.intent,
    contact: contactData
  };

  for (const [key, val] of Object.entries(answers)) {
    if (val.values) {
      let text = val.values.join(' | ');
      if (val.otherText) text += ` | OTRO: ${val.otherText}`;
      payload.responses[key] = text;
    } else if (val.value !== undefined) {
      let text = val.value;
      if (val.otherText) text += ` (OTRO: ${val.otherText})`;
      if (val.conditionalText) text += ` → ${val.conditionalText}`;
      if (val.budgetValue) text += ` [Presupuesto: ${val.budgetValue}]`;
      payload.responses[key] = text;
    }
  }

  document.getElementById('sendingOverlay').classList.add('visible');
  fetch(APPS_SCRIPT_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(() => { document.getElementById('sendingOverlay').classList.remove('visible'); showThankYou(intent); })
    .catch(() => { document.getElementById('sendingOverlay').classList.remove('visible'); showThankYou(intent); });
}

function showThankYou(intent) {
  const messages = {
    0: { title: '¡Gracias por participar!', body: 'Tu respuesta ha sido registrada. Alguien del equipo de FraudEG se pondrá en contacto contigo en los próximos días. También recibirás el resumen del estudio cuando esté listo.' },
    1: { title: '¡Gracias por participar!', body: 'Tu respuesta ha sido registrada. Cuando el estudio esté listo, recibirás el resumen en el correo que nos proporcionaste.' },
    2: { title: '¡Gracias por tu tiempo!', body: 'Tu respuesta ha sido registrada de forma anónima y contribuirá al estudio de mercado antifraude de LATAM.' }
  };
  const msg = messages[intent] || messages[2];
  document.getElementById('formContainer').innerHTML = `<div class="thank-you"><div class="icon">✓</div><h2>${msg.title}</h2><p>${msg.body}</p></div>`;
  document.querySelector('.progress-wrap').style.display = 'none';
}

function updateProgress() {
  const total = currentFlow.length;
  const pct = Math.round((currentStep / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepCurrent').textContent = currentStep + 1;
  document.getElementById('stepTotal').textContent = total;
  document.getElementById('progressPct').textContent = pct + '%';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderStep(0);
</script>
