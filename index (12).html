<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FraudEG — Estudio de Mercado Antifraude LATAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --surface:#12121a;
  --surface2:#1a1a26;
  --border:#2a2a3a;
  --border-active:#6c5ce7;
  --accent:#6c5ce7;
  --accent-glow:rgba(108,92,231,.25);
  --accent2:#00cec9;
  --text:#e8e8f0;
  --text-dim:#8888a0;
  --text-muted:#55556a;
  --danger:#ff6b6b;
  --success:#00b894;
  --warning:#fdcb6e;
  --radius:12px;
  --radius-sm:8px;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'Space Mono',monospace;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
/* ─── BG GRID ─── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%,rgba(108,92,231,.08),transparent),
    radial-gradient(ellipse 60% 40% at 80% 90%,rgba(0,206,201,.06),transparent),
    linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,60px 60px,60px 60px;
  pointer-events:none;
}
.app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:24px 20px 60px}

/* ─── HEADER ─── */
.header{text-align:center;margin-bottom:40px;padding-top:20px}
.logo{
  font-family:var(--mono);font-size:1.6rem;font-weight:700;letter-spacing:2px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:inline-block;margin-bottom:8px;
}
.logo span{font-weight:400;opacity:.7}
.tagline{font-size:.85rem;color:var(--text-dim);letter-spacing:.5px}

/* ─── PROGRESS ─── */
.progress-wrap{margin-bottom:36px}
.progress-bar-bg{
  height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;
  position:relative;
}
.progress-bar-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 12px var(--accent-glow);
}
.progress-info{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:10px;font-size:.78rem;color:var(--text-muted);
  font-family:var(--mono);
}
.progress-info .step-label{color:var(--accent);font-weight:700}

/* ─── STEP CARDS ─── */
.step{
  display:none;
  animation:fadeUp .4s ease both;
}
.step.active{display:block}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
.step-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:32px 28px;
  position:relative;
  overflow:hidden;
}
.step-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--accent2),transparent);
}
.q-number{
  font-family:var(--mono);font-size:.7rem;letter-spacing:2px;
  color:var(--accent);text-transform:uppercase;margin-bottom:6px;
  display:flex;align-items:center;gap:8px;
}
.q-number .badge{
  font-size:.6rem;padding:2px 8px;border-radius:99px;
  background:rgba(108,92,231,.15);border:1px solid rgba(108,92,231,.3);
}
.q-number .badge.optional{
  background:rgba(253,203,110,.1);border-color:rgba(253,203,110,.3);color:var(--warning);
}
.q-title{
  font-size:1.15rem;font-weight:600;line-height:1.5;
  margin-bottom:20px;color:var(--text);
}
.q-hint{
  font-size:.78rem;color:var(--text-muted);margin-bottom:16px;
  font-style:italic;
}

/* ─── OPTION BUTTONS (single select) ─── */
.options-single{display:flex;flex-direction:column;gap:10px}
.opt-btn{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px 16px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  cursor:pointer;
  transition:all .2s;
  text-align:left;
  font-size:.88rem;line-height:1.5;color:var(--text);
  position:relative;
}
.opt-btn:hover{border-color:var(--accent);background:rgba(108,92,231,.06)}
.opt-btn.selected{
  border-color:var(--accent);
  background:rgba(108,92,231,.1);
  box-shadow:0 0 0 1px var(--accent),0 4px 16px var(--accent-glow);
}
.opt-radio{
  width:18px;height:18px;min-width:18px;border-radius:50%;
  border:2px solid var(--border);margin-top:2px;
  transition:all .2s;position:relative;
}
.opt-btn.selected .opt-radio{
  border-color:var(--accent);
  background:var(--accent);
  box-shadow:inset 0 0 0 3px var(--surface2);
}

/* ─── CHECKBOXES (multi select) ─── */
.options-multi{display:flex;flex-direction:column;gap:8px}
.opt-check{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 14px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  cursor:pointer;transition:all .2s;
  font-size:.85rem;line-height:1.4;color:var(--text);
}
.opt-check:hover{border-color:var(--accent);background:rgba(108,92,231,.04)}
.opt-check.selected{
  border-color:var(--accent);background:rgba(108,92,231,.08);
}
.opt-checkbox{
  width:18px;height:18px;min-width:18px;border-radius:4px;
  border:2px solid var(--border);margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-size:11px;
}
.opt-check.selected .opt-checkbox{
  border-color:var(--accent);background:var(--accent);color:#fff;
}
.opt-check.selected .opt-checkbox::after{content:'✓'}
.max-hint{
  font-size:.72rem;color:var(--warning);margin-top:8px;
  font-family:var(--mono);
}
.max-reached .opt-check:not(.selected){opacity:.4;pointer-events:none}

/* ─── TEXT INPUTS ─── */
.field-group{margin-bottom:16px}
.field-label{
  display:block;font-size:.78rem;color:var(--text-dim);
  margin-bottom:6px;font-weight:500;
}
.field-label .req{color:var(--danger)}
input[type="text"],input[type="email"],input[type="tel"],textarea{
  width:100%;padding:12px 14px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);
  font-family:var(--font);font-size:.88rem;
  transition:border-color .2s;outline:none;
}
input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
textarea{resize:vertical;min-height:80px}
input::placeholder,textarea::placeholder{color:var(--text-muted)}

/* ─── OPEN TEXT FIELD for "Otro" ─── */
.open-field{
  margin-top:10px;display:none;
  animation:fadeUp .3s ease both;
}
.open-field.visible{display:block}

/* ─── CONDITIONAL TEXTAREA ─── */
.conditional-textarea{
  margin-top:12px;display:none;
  animation:fadeUp .3s ease both;
}
.conditional-textarea.visible{display:block}

/* ─── BUTTONS ─── */
.btn-row{
  display:flex;gap:10px;margin-top:24px;justify-content:flex-end;
  flex-wrap:wrap;
}
.btn{
  padding:12px 28px;border-radius:var(--radius-sm);
  font-family:var(--font);font-size:.88rem;font-weight:600;
  cursor:pointer;transition:all .25s;border:none;
  letter-spacing:.3px;
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#8b7cf7);
  color:#fff;
  box-shadow:0 4px 16px var(--accent-glow);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(108,92,231,.4)}
.btn-primary:disabled{opacity:.4;pointer-events:none;transform:none}
.btn-ghost{
  background:transparent;color:var(--text-dim);
  border:1px solid var(--border);
}
.btn-ghost:hover{border-color:var(--text-dim);color:var(--text)}
.btn-skip{
  background:transparent;color:var(--text-muted);
  border:1px dashed var(--border);font-size:.82rem;
}
.btn-skip:hover{border-color:var(--text-dim);color:var(--text-dim)}

/* ─── CONTACT FORM ─── */
.contact-grid{display:grid;gap:14px}

/* ─── THANK YOU ─── */
.thank-you{text-align:center;padding:60px 20px}
.thank-you .icon{font-size:3rem;margin-bottom:16px}
.thank-you h2{
  font-size:1.5rem;font-weight:700;margin-bottom:10px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.thank-you p{color:var(--text-dim);line-height:1.6;max-width:440px;margin:0 auto}

/* ─── VALIDATION ─── */
.error-msg{
  font-size:.75rem;color:var(--danger);margin-top:6px;
  display:none;font-family:var(--mono);
}
.error-msg.visible{display:block}
.field-error input,.field-error textarea{border-color:var(--danger)!important}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--danger);color:#fff;padding:12px 24px;
  border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;
  opacity:0;transition:all .3s;z-index:999;pointer-events:none;
  box-shadow:0 8px 24px rgba(255,107,107,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── SENDING OVERLAY ─── */
.sending-overlay{
  position:fixed;inset:0;background:rgba(10,10,15,.85);
  display:none;align-items:center;justify-content:center;
  z-index:1000;backdrop-filter:blur(4px);
}
.sending-overlay.visible{display:flex}
.sending-box{text-align:center}
.spinner{
  width:40px;height:40px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;margin:0 auto 16px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.sending-box p{color:var(--text-dim);font-size:.9rem}

/* ─── RESPONSIVE ─── */
@media(max-width:600px){
  .app{padding:16px 14px 40px}
  .step-card{padding:24px 18px}
  .q-title{font-size:1.05rem}
  .btn-row{flex-direction:column}
  .btn{width:100%;text-align:center}
}
</style>
</head>

// ── STATE ──
let currentStep = 0;
let answers = {};
let currentFlow = [];
let selectedSector = null;

function buildFlow(sector) {
  selectedSector = sector;
  let sectorQs;
  switch(sector) {
    case 'fintech': sectorQs = Q_FINTECH; break;
    case 'retail': sectorQs = Q_RETAIL; break;
    case 'marketplace': sectorQs = Q_MARKETPLACE; break;
    default: sectorQs = []; break;
  }
  currentFlow = [...Q_UNIVERSAL_START, ...sectorQs, ...Q_SHARED_MID, ...Q_UNIVERSAL_END];
}

// Initialize with default flow — will rebuild after Q02
buildFlow('retail');

// ── RENDERING ──
function renderStep(idx) {
  const q = currentFlow[idx];
  const container = document.getElementById('formContainer');

  let html = `<div class="step active" id="step-${idx}"><div class="step-card">`;
  
  // Header
  const badgeType = q.required ? '' : 'optional';
  const badgeText = q.required ? 'Obligatoria' : 'Opcional';
  html += `<div class="q-number">${q.id} <span class="badge ${badgeType}">${badgeText}</span></div>`;
  html += `<div class="q-title">${q.title}</div>`;

  if (q.type === 'single') {
    if (q.max > 1) html += `<div class="q-hint">Selecciona una opción</div>`;
    html += `<div class="options-single" id="opts-${idx}">`;
    q.options.forEach((opt, i) => {
      html += `<div class="opt-btn" data-idx="${i}" onclick="selectSingle(${idx},${i})">
        <div class="opt-radio"></div><div>${opt}</div>
      </div>`;
    });
    html += '</div>';
    if (q.hasOtherField) {
      html += `<div class="open-field" id="other-${idx}">
        <input type="text" placeholder="Especifica tu respuesta…" id="otherInput-${idx}">
      </div>`;
    }
    if (q.conditionalTextarea !== undefined) {
      html += `<div class="conditional-textarea" id="condText-${idx}">
        <textarea placeholder="${q.conditionalPlaceholder||'Especifica…'}" id="condTextInput-${idx}"></textarea>
      </div>`;
    }
    if (q.conditionalBudgetField !== undefined) {
      html += `<div class="conditional-textarea" id="budgetField-${idx}">
        <div class="field-group">
          <label class="field-label">Valor aproximado (USD)</label>
          <input type="text" placeholder="Ej: 50,000" id="budgetInput-${idx}">
        </div>
      </div>`;
    }
  }
  else if (q.type === 'multi') {
    if (q.max < 99) html += `<div class="q-hint">Selecciona hasta ${q.max} opciones</div>`;
    html += `<div class="options-multi" id="opts-${idx}">`;
    q.options.forEach((opt, i) => {
      html += `<div class="opt-check" data-idx="${i}" onclick="toggleMulti(${idx},${i})">
        <div class="opt-checkbox"></div><div>${opt}</div>
      </div>`;
    });
    html += '</div>';
    if (q.max < 99) html += `<div class="max-hint" id="maxHint-${idx}">0 / ${q.max} seleccionadas</div>`;
    if (q.hasOtherField) {
      html += `<div class="open-field" id="other-${idx}">
        <input type="text" placeholder="Especifica tu respuesta…" id="otherInput-${idx}">
      </div>`;
    }
  }
  else if (q.type === 'textarea') {
    html += `<textarea placeholder="${q.placeholder||''}" id="textareaInput-${idx}" rows="4"></textarea>`;
  }
  else if (q.type === 'contact') {
    html += `<div class="contact-grid">
      <div class="field-group">
        <label class="field-label">Nombre completo <span class="req">*</span></label>
        <input type="text" id="c-name" placeholder="Tu nombre">
        <div class="error-msg" id="err-name">Campo obligatorio</div>
      </div>
      <div class="field-group">
        <label class="field-label">Empresa / Organización</label>
        <input type="text" id="c-company" placeholder="Nombre de la empresa">
      </div>
      <div class="field-group">
        <label class="field-label">Correo electrónico <span class="req">*</span></label>
        <input type="email" id="c-email" placeholder="correo@empresa.com">
        <div class="error-msg" id="err-email">Ingresa un correo válido</div>
      </div>
      <div class="field-group">
        <label class="field-label">Teléfono <span class="req">*</span></label>
        <input type="tel" id="c-phone" placeholder="+57 300 123 4567">
        <div class="error-msg" id="err-phone">Ingresa un teléfono válido</div>
      </div>
      <div class="field-group">
        <label class="field-label">País</label>
        <input type="text" id="c-country" placeholder="País">
      </div>
    </div>`;
  }

  // Buttons
  html += '<div class="btn-row">';
  if (idx > 0) html += `<button class="btn btn-ghost" onclick="goBack()">← Atrás</button>`;
  if (!q.required) html += `<button class="btn btn-skip" onclick="skipStep()">Saltar</button>`;
  
  if (q.type === 'contact') {
    html += `<button class="btn btn-primary" onclick="submitForm()">Enviar ✓</button>`;
  } else if (!q.autoAdvance) {
    html += `<button class="btn btn-primary" id="nextBtn-${idx}" onclick="goNext()">Continuar →</button>`;
  }
  html += '</div>';

  html += '</div></div>';
  container.innerHTML = html;
  updateProgress();
}

// ── SELECTION HANDLERS ──
function selectSingle(stepIdx, optIdx) {
  const q = currentFlow[stepIdx];
  answers[q.id] = { value: q.options[optIdx], index: optIdx };

  // Visual
  document.querySelectorAll(`#opts-${stepIdx} .opt-btn`).forEach(el => el.classList.remove('selected'));
  document.querySelector(`#opts-${stepIdx} .opt-btn[data-idx="${optIdx}"]`).classList.add('selected');

  // "Otro" field
  if (q.hasOtherField) {
    const otherEl = document.getElementById(`other-${stepIdx}`);
    const isOther = optIdx === q.options.length - 1;
    otherEl.classList.toggle('visible', isOther);
    if (isOther) document.getElementById(`otherInput-${stepIdx}`).focus();
  }

  // Conditional textarea (Q10)
  if (q.conditionalTextarea !== undefined) {
    const condEl = document.getElementById(`condText-${stepIdx}`);
    condEl.classList.toggle('visible', optIdx === q.conditionalTextarea);
    if (optIdx === q.conditionalTextarea) document.getElementById(`condTextInput-${stepIdx}`).focus();
  }

  // Budget field (Q11)
  if (q.conditionalBudgetField !== undefined) {
    const budgetEl = document.getElementById(`budgetField-${stepIdx}`);
    budgetEl.classList.toggle('visible', optIdx === q.conditionalBudgetField);
    if (optIdx === q.conditionalBudgetField) document.getElementById(`budgetInput-${stepIdx}`).focus();
  }

  // Auto-advance (with slight delay for UX)
  if (q.autoAdvance && !(q.hasOtherField && optIdx === q.options.length - 1)) {
    // Don't auto-advance if conditional fields need input
    if (q.conditionalTextarea !== undefined && optIdx === q.conditionalTextarea) return;
    if (q.conditionalBudgetField !== undefined && optIdx === q.conditionalBudgetField) return;
    setTimeout(() => goNext(), 400);
  }
}

function toggleMulti(stepIdx, optIdx) {
  const q = currentFlow[stepIdx];
  if (!answers[q.id]) answers[q.id] = { values: [], indices: [] };
  const ans = answers[q.id];

  const el = document.querySelector(`#opts-${stepIdx} .opt-check[data-idx="${optIdx}"]`);
  const isSelected = el.classList.contains('selected');

  if (isSelected) {
    el.classList.remove('selected');
    ans.indices = ans.indices.filter(i => i !== optIdx);
    ans.values = ans.indices.map(i => q.options[i]);
  } else {
    if (q.max < 99 && ans.indices.length >= q.max) {
      showToast(`Máximo ${q.max} opciones`);
      return;
    }
    el.classList.add('selected');
    ans.indices.push(optIdx);
    ans.values = ans.indices.map(i => q.options[i]);
  }

  // Max hint
  if (q.max < 99) {
    const hintEl = document.getElementById(`maxHint-${stepIdx}`);
    hintEl.textContent = `${ans.indices.length} / ${q.max} seleccionadas`;
    const wrapper = document.getElementById(`opts-${stepIdx}`);
    wrapper.classList.toggle('max-reached', ans.indices.length >= q.max);
  }

  // "Otro" field
  if (q.hasOtherField) {
    const otherIdx = q.options.length - 1;
    const otherEl = document.getElementById(`other-${stepIdx}`);
    otherEl.classList.toggle('visible', ans.indices.includes(otherIdx));
  }
}

// ── NAVIGATION ──
function goNext() {
  const q = currentFlow[currentStep];

  // Validation
  if (q.required) {
    if (q.type === 'single' && !answers[q.id]) {
      showToast('Selecciona una opción para continuar');
      return;
    }
    if (q.type === 'multi' && (!answers[q.id] || answers[q.id].indices.length === 0)) {
      showToast('Selecciona al menos una opción');
      return;
    }
  }

  // Capture "Otro" text
  if (q.hasOtherField && answers[q.id]) {
    const otherInput = document.getElementById(`otherInput-${currentStep}`);
    if (otherInput && otherInput.parentElement.classList.contains('visible')) {
      answers[q.id].otherText = otherInput.value;
    }
  }

  // Capture conditional textarea
  if (q.conditionalTextarea !== undefined && answers[q.id]) {
    const condInput = document.getElementById(`condTextInput-${currentStep}`);
    if (condInput && condInput.parentElement.classList.contains('visible')) {
      if (q.required && !condInput.value.trim()) {
        showToast('Por favor completa el campo adicional');
        return;
      }
      answers[q.id].conditionalText = condInput.value;
    }
  }

  // Capture budget
  if (q.conditionalBudgetField !== undefined && answers[q.id]) {
    const budgetInput = document.getElementById(`budgetInput-${currentStep}`);
    if (budgetInput && budgetInput.parentElement.classList.contains('visible')) {
      answers[q.id].budgetValue = budgetInput.value;
    }
  }

  // Capture textarea
  if (q.type === 'textarea') {
    const ta = document.getElementById(`textareaInput-${currentStep}`);
    answers[q.id] = { value: ta.value };
  }

  // After Q02 — rebuild flow based on sector
  if (q.id === 'Q02' && answers.Q02) {
    const sectorKey = q.sectorMap[answers.Q02.index] || 'otro';
    buildFlow(sectorKey);
    currentStep = 2; // jump to Q03
    renderStep(currentStep);
    return;
  }

  currentStep++;
  if (currentStep < currentFlow.length) {
    renderStep(currentStep);
  }
}

function goBack() {
  if (currentStep > 0) {
    // If we're at Q03 sector-specific, go back to Q02
    if (currentStep === 2) {
      currentStep = 1;
    } else {
      currentStep--;
    }
    renderStep(currentStep);
  }
}

function skipStep() {
  currentStep++;
  if (currentStep < currentFlow.length) {
    renderStep(currentStep);
  }
}

// ── SUBMIT ──
function submitForm() {
  // Validate contact fields
  const name = document.getElementById('c-name').value.trim();
  const email = document.getElementById('c-email').value.trim();
  const phone = document.getElementById('c-phone').value.trim();
  const company = document.getElementById('c-company').value.trim();
  const country = document.getElementById('c-country').value.trim();

  let valid = true;

  if (!name) {
    document.getElementById('err-name').classList.add('visible');
    document.getElementById('err-name').parentElement.classList.add('field-error');
    valid = false;
  } else {
    document.getElementById('err-name').classList.remove('visible');
    document.getElementById('err-name').parentElement.classList.remove('field-error');
  }

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    document.getElementById('err-email').classList.add('visible');
    document.getElementById('err-email').parentElement.classList.add('field-error');
    valid = false;
  } else {
    document.getElementById('err-email').classList.remove('visible');
    document.getElementById('err-email').parentElement.classList.remove('field-error');
  }

  if (!phone || phone.length < 7) {
    document.getElementById('err-phone').classList.add('visible');
    document.getElementById('err-phone').parentElement.classList.add('field-error');
    valid = false;
  } else {
    document.getElementById('err-phone').classList.remove('visible');
    document.getElementById('err-phone').parentElement.classList.remove('field-error');
  }

  if (!valid) {
    showToast('Completa los campos obligatorios');
    return;
  }

  answers.Q12 = { name, email, phone, company, country };

  // Build payload
  const payload = {
    timestamp: new Date().toISOString(),
    sector: selectedSector,
    responses: {}
  };

  for (const [key, val] of Object.entries(answers)) {
    if (val.values) {
      // multi-select
      let text = val.values.join(' | ');
      if (val.otherText) text += ` | OTRO: ${val.otherText}`;
      payload.responses[key] = text;
    } else if (val.value !== undefined) {
      let text = val.value;
      if (val.otherText) text += ` (OTRO: ${val.otherText})`;
      if (val.conditionalText) text += ` → ${val.conditionalText}`;
      if (val.budgetValue) text += ` [Presupuesto: ${val.budgetValue}]`;
      payload.responses[key] = text;
    } else if (val.name) {
      // contact
      payload.responses[key] = `${val.name} | ${val.company} | ${val.email} | ${val.phone} | ${val.country}`;
      payload.contact = val;
    }
  }

  // Send to Apps Script
  const overlay = document.getElementById('sendingOverlay');
  overlay.classList.add('visible');

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(() => {
    overlay.classList.remove('visible');
    showThankYou();
  })
  .catch(err => {
    overlay.classList.remove('visible');
    // With no-cors, we can't read the response, but the request was sent
    showThankYou();
  });
}

function showThankYou() {
  const container = document.getElementById('formContainer');
  container.innerHTML = `
    <div class="thank-you">
      <div class="icon">✓</div>
      <h2>¡Gracias por participar!</h2>
      <p>Tu respuesta ha sido registrada. Cuando el estudio esté listo, recibirás el resumen en el correo que nos proporcionaste.</p>
    </div>
  `;
  // Hide progress
  document.querySelector('.progress-wrap').style.display = 'none';
}

// ── PROGRESS ──
function updateProgress() {
  const total = currentFlow.length;
  const pct = Math.round(((currentStep) / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepCurrent').textContent = currentStep + 1;
  document.getElementById('stepTotal').textContent = total;
  document.getElementById('progressPct').textContent = pct + '%';
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── INIT ──
renderStep(0);
